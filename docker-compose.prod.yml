services:
  # ─── Banco de dados ──────────────────────────────────────────────────────────
  # Para usar AWS RDS: remova este serviço e ajuste DATABASE_URL em .env.production
  postgres:
    image: postgres:15-alpine
    restart: always
    env_file: .env.production
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-o2_solution}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin} -d ${DB_NAME:-o2_solution}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ─── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file: .env.production
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Frontend React + Nginx ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: always
    ports:
      - "80:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
